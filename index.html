<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario de Postes</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body>
    <h1>Registro de Poste</h1>
    
    <form id="posteForm">
        <input type="text" id="codigo" placeholder="Código del Poste" required>
        <br><br>
        <button type="button" onclick="obtenerUbicacion()">Obtener GPS</button>
        <p id="coords">Ubicación: No capturada</p>
        
        <label>Foto del poste:</label>
        <input type="file" accept="image/*" capture="environment" id="foto" required>
        <br><br>
        
        <button type="submit">Guardar Registro Localmente</button>
    </form>

    <hr>

    <h3>Gestión de Datos</h3>
    <button type="button" id="btnSincronizar" onclick="sincronizarPendientes()">Sincronizar Pendientes con el Servidor</button>
    <p id="estadoSync"></p>

    <script src="app.js"></script>
</body>
</html>
